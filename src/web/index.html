<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tamagit</title>
<style>
  :root {
    --bg: #0a0c13;
    --bg2: #0f1220;
    --panel: #151a2b;
    --panel2: #1b2136;
    --line: #262d47;
    --txt: #e8ecf7;
    --dim: #8f9ac0;
    --faint: #5b6486;
    --gold: #ffc857;
    --xp: #7c5cff;
    --xp2: #22d3ee;
    --fire: #ff7a45;
    --good: #46d39a;
    --rare: #4aa8ff;
    --epic: #b06bff;
    --legend: #ffb020;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 15% -10%, #1c1b4d55, transparent 60%),
      radial-gradient(1000px 500px at 90% 0%, #0e4b5b55, transparent 55%),
      var(--bg);
    color: var(--txt);
    font-family: Pretendard, "Pretendard Variable", -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    font-feature-settings: "tnum";
    min-height: 100vh;
    padding: 32px 20px 64px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }

  .topbar { display: flex; align-items: baseline; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .brand .mark { color: var(--gold); }
  .meta { color: var(--faint); font-size: 12.5px; }
  .meta b { color: var(--dim); font-weight: 600; }

  .panel {
    background: linear-gradient(180deg, var(--panel), var(--bg2));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
  }

  /* ---- HERO ---- */
  .hero { display: grid; grid-template-columns: auto 1fr; gap: 28px; align-items: center; margin-bottom: 18px; }
  .petbox { position: relative; width: 168px; height: 168px; display: grid; place-items: center; }
  .ring { position: absolute; inset: 0; transform: rotate(-90deg); }
  .pet {
    font-size: 72px; line-height: 1;
    filter: drop-shadow(0 0 22px #7c5cff88);
    animation: bob 3.2s ease-in-out infinite;
  }
  .pet.blazing { filter: drop-shadow(0 0 26px #ff7a45cc); animation-duration: 1.5s; }
  .pet.asleep { filter: grayscale(.5) drop-shadow(0 0 10px #33405f88); animation-duration: 5s; }
  @keyframes bob { 0%,100% { transform: translateY(-3px); } 50% { transform: translateY(5px); } }
  .lvlbadge {
    position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--line);
    padding: 3px 12px; border-radius: 999px; font-size: 12px; font-weight: 800;
    color: var(--gold); white-space: nowrap;
  }

  .heroinfo h1 { margin: 0 0 4px; font-size: 30px; letter-spacing: -0.03em; }
  .heroinfo h1 .lv { color: var(--gold); }
  .mood { color: var(--dim); font-size: 13.5px; margin-bottom: 16px; }
  .mood .tag {
    display: inline-block; background: #ffffff0e; border: 1px solid var(--line);
    border-radius: 999px; padding: 2px 10px; font-size: 11.5px; margin-right: 8px; color: var(--txt);
  }
  .xpbar { height: 14px; background: #ffffff0d; border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
  .xpbar > i {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--xp), var(--xp2));
    box-shadow: 0 0 18px #7c5cffaa;
    transition: width .8s cubic-bezier(.2,.8,.2,1);
  }
  .xpnums { display: flex; justify-content: space-between; margin-top: 7px; font-size: 12.5px; color: var(--dim); }
  .xpnums b { color: var(--txt); }

  /* ---- TILES ---- */
  .tiles { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 18px; }
  .tile { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; }
  .tile .k { font-size: 11.5px; color: var(--faint); letter-spacing: .02em; margin-bottom: 6px; }
  .tile .v { font-size: 25px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .tile .s { font-size: 11.5px; color: var(--dim); margin-top: 4px; }
  .tile.today .v { color: var(--gold); }
  .tile.streak .v { color: var(--fire); }
  .tile.bosses .v { color: #ff6b8a; }
  .risk { color: var(--fire); }

  /* ---- GRID ---- */
  .grid2 { display: grid; grid-template-columns: 1.55fr 1fr; gap: 14px; margin-bottom: 14px; align-items: start; }
  .grid2.rev { grid-template-columns: 1fr 1.55fr; }
  h2 { margin: 0 0 14px; font-size: 13.5px; font-weight: 700; color: var(--dim); letter-spacing: .01em; }
  h2 span { color: var(--faint); font-weight: 500; }

  /* ---- HEATMAP ---- */
  .heat { display: flex; gap: 4px; }
  .heat .col { display: flex; flex-direction: column; gap: 4px; }
  .cell { width: 16px; height: 16px; border-radius: 4px; background: #ffffff0a; flex: none; }
  .cell.l1 { background: #2b3a6a; }
  .cell.l2 { background: #45509f; }
  .cell.l3 { background: #6a5cd8; }
  .cell.l4 { background: #9b7bff; box-shadow: 0 0 8px #9b7bff77; }
  .cell.today { outline: 2px solid var(--gold); outline-offset: 1px; }
  .heatlegend { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11.5px; color: var(--faint); }

  /* ---- BARS ---- */
  .rows { display: flex; flex-direction: column; gap: 9px; }
  .row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; font-size: 13px; }
  .row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .track { grid-column: 1 / -1; height: 6px; background: #ffffff0a; border-radius: 99px; overflow: hidden; }
  .row .track > i { display: block; height: 100%; background: linear-gradient(90deg, var(--xp2), var(--xp)); }
  .row .num { color: var(--dim); font-size: 12px; }

  /* ---- HOURS ---- */
  .hours { display: flex; align-items: flex-end; gap: 3px; height: 96px; }
  .hours .h { flex: 1; background: linear-gradient(180deg, var(--xp2), #2b3a6a); border-radius: 3px 3px 0 0; min-height: 2px; }
  .hours .h.peak { background: linear-gradient(180deg, var(--gold), #a06a1a); }
  .hourlabels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10.5px; color: var(--faint); }

  /* ---- ACHIEVEMENTS ---- */
  .achs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .ach {
    display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start;
    background: var(--panel2); border: 1px solid var(--line);
    border-radius: 13px; padding: 12px 14px;
  }
  .ach.locked { background: #ffffff05; opacity: .62; }
  .ach .ic { font-size: 24px; line-height: 1.2; filter: drop-shadow(0 0 8px #ffffff22); }
  .ach.locked .ic { filter: grayscale(1); }
  .ach .nm { font-weight: 700; font-size: 13.5px; display: flex; align-items: center; gap: 7px; }
  .ach .ds { font-size: 11.5px; color: var(--faint); margin-top: 2px; }
  .pill { font-size: 9.5px; padding: 1px 7px; border-radius: 99px; border: 1px solid currentColor; font-weight: 700; }
  .pill.common { color: var(--dim); }
  .pill.rare { color: var(--rare); }
  .pill.epic { color: var(--epic); }
  .pill.legendary { color: var(--legend); }
  .ach .prog { height: 4px; background: #ffffff0d; border-radius: 99px; margin-top: 8px; overflow: hidden; }
  .ach .prog > i { display: block; height: 100%; background: var(--dim); }
  .ach .when { font-size: 10.5px; color: var(--good); margin-top: 6px; }

  /* ---- BOSS ---- */
  .bossrow { display: flex; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
  .bossrow:last-child { border-bottom: 0; }
  .bossrow .bn { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bossrow .bs { color: var(--dim); font-size: 12px; white-space: nowrap; }

  /* ---- FOOTER ---- */
  .shield {
    margin-top: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: linear-gradient(90deg, #10312688, transparent);
    border: 1px solid #1f4a3a; border-radius: 14px; padding: 14px 18px; font-size: 13px;
  }
  .shield .big { font-size: 18px; }
  .shield code { color: var(--faint); font-size: 11.5px; }
  .err { border-color: #5a2330; background: linear-gradient(90deg, #3a161f88, transparent); }

  @media (max-width: 900px) {
    .tiles { grid-template-columns: repeat(2, 1fr); }
    .grid2, .grid2.rev { grid-template-columns: 1fr; }
    .hero { grid-template-columns: 1fr; justify-items: center; text-align: center; }
    .achs { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="meta">Loading…</div>
</div>

<script>
let S = {};   // 서버가 내려주는 언어별 문자열
// {name} 자리표시자를 채운다 — 어순이 언어마다 달라서 필요하다
const f = (tpl, vals) => String(tpl ?? '').replace(/\{(\w+)\}/g, (_, k) => vals[k] ?? '');
const $ = (h) => { const t = document.createElement('template'); t.innerHTML = h.trim(); return t.content.firstElementChild; };
const num = (n) => (n ?? 0).toLocaleString(LOC);
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
let LOC = 'en-US';
const fmtDate = (ts) => new Date(ts).toLocaleDateString(LOC, { month: 'numeric', day: 'numeric' });
const fmtDateTime = (ts) => new Date(ts).toLocaleString(LOC, { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });

function ring(progress) {
  const R = 76, C = 2 * Math.PI * R;
  return `<svg class="ring" viewBox="0 0 168 168" width="168" height="168">
    <circle cx="84" cy="84" r="${R}" fill="none" stroke="#ffffff10" stroke-width="9"/>
    <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient></defs>
    <circle cx="84" cy="84" r="${R}" fill="none" stroke="url(#rg)" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${C}" stroke-dashoffset="${C * (1 - progress)}"
      style="transition: stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"/>
  </svg>`;
}

function sparkline(days) {
  const d = days.slice(-30);
  if (!d.length) return '';
  const W = 100, H = 34, max = Math.max(1, ...d.map((x) => x.xp));
  const pt = (i, v) => [(i / Math.max(1, d.length - 1)) * W, H - (v / max) * (H - 3)];
  const line = d.map((x, i) => pt(i, x.xp).map((n) => n.toFixed(1)).join(',')).join(' L');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:56px;display:block">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c5cff88"/><stop offset="100%" stop-color="#7c5cff00"/>
    </linearGradient></defs>
    <path d="M${line} L${W},${H} L0,${H} Z" fill="url(#ag)"/>
    <path d="M${line}" fill="none" stroke="#9b7bff" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

function heatmap(days, today) {
  const d = days.slice(-119);
  if (!d.length) return `<div class="meta">${S.noData}</div>`;
  const max = Math.max(1, ...d.map((x) => x.xp));
  const lvl = (xp) => (xp <= 0 ? 0 : xp / max > 0.6 ? 4 : xp / max > 0.32 ? 3 : xp / max > 0.12 ? 2 : 1);
  const dow = (day) => new Date(day + 'T00:00:00Z').getUTCDay();
  const cols = [];
  let col = new Array(dow(d[0].day)).fill(null);
  for (const x of d) {
    col.push(x);
    if (col.length === 7) { cols.push(col); col = []; }
  }
  if (col.length) cols.push(col);
  const html = cols.map((c) => `<div class="col">${c.map((x) =>
    x === null ? '<div class="cell" style="visibility:hidden"></div>'
      : `<div class="cell l${lvl(x.xp)}${x.day === today ? ' today' : ''}" title="${x.day} · ${num(x.xp)} XP · ${x.prompts}"></div>`
  ).join('')}</div>`).join('');
  return `<div class="heat">${html}</div>
    <div class="heatlegend">${S.less}
      <span class="cell"></span><span class="cell l1"></span><span class="cell l2"></span>
      <span class="cell l3"></span><span class="cell l4"></span>${S.more}
      <span style="margin-left:auto">${d[0].day} → ${d[d.length - 1].day}</span>
    </div>`;
}

function render(s) {
  S = s.s || {};
  LOC = s.lang === 'ko' ? 'ko-KR' : 'en-US';
  document.title = S.title || 'tamagit';
  const app = document.getElementById('app');
  const p = s.pet;
  const peakHour = s.hours.indexOf(Math.max(...s.hours));
  const maxHour = Math.max(1, ...s.hours);
  const projMax = Math.max(1, ...s.projects.slice(0, 6).map((x) => x.prompts));
  const unlocked = s.achievements.filter((a) => a.unlockedAt).length;
  const lastErr = s.source.syncs[0]?.parseErrors ?? 0;

  app.innerHTML = `
  <div class="topbar">
    <div class="brand"><span class="mark">🥚</span> tamagit</div>
    <div class="meta">
      <b>${s.today}</b> · ${esc(s.timeZone)} · ${S.dayStart} <b>${s.dayStartHour}:00</b>
      · ${S.focusGap} <b>30m</b>
      ${s.source.lastSyncAt ? `· ${S.lastSync} <b>${fmtDateTime(s.source.lastSyncAt)}</b>` : ''}
    </div>
  </div>

  <div class="panel hero">
    <div class="petbox">
      ${ring(s.level.progress)}
      <div class="pet ${p.mood}">${p.icon}</div>
      <div class="lvlbadge">${esc(p.name)}</div>
    </div>
    <div class="heroinfo">
      <h1><span class="lv">Lv.${s.level.level}</span> ${esc(p.name)}</h1>
      <div class="mood"><span class="tag">${esc(p.moodLabel)}</span>${esc(p.line)}</div>
      <div class="xpbar"><i style="width:${(s.level.progress * 100).toFixed(1)}%"></i></div>
      <div class="xpnums">
        <span><b>${num(s.level.intoLevel)}</b> / ${num(s.level.needed)} XP</span>
        <span>${S.nextLevel} <b>${num(s.level.needed - s.level.intoLevel)}</b> · <b>${num(s.level.totalXp)}</b> ${S.totalXpSuffix}</span>
      </div>
    </div>
  </div>

  <div class="tiles">
    <div class="tile today"><div class="k">${S.todayXp}</div><div class="v">${num(s.todayStat.xp)}</div>
      <div class="s">${f(S.promptsCount, { n: num(s.todayStat.prompts) })}</div></div>
    <div class="tile streak"><div class="k">${S.streakLabel}</div><div class="v">${f(S.streakValue, { n: s.streak.current })} ${s.streak.current ? '🔥' : '💤'}</div>
      <div class="s">${s.streak.atRisk ? `<span class="risk">${S.breaksToday}</span>` : f(S.longest, { n: s.streak.longest })}</div></div>
    <div class="tile"><div class="k">${S.totalPrompts}</div><div class="v">${num(s.totals.prompts)}</div>
      <div class="s">${f(S.activeDays, { a: s.totals.activeDays, b: s.totals.calendarDays })}</div></div>
    <div class="tile bosses"><div class="k">${S.bossCleared}</div><div class="v">${num(s.totals.bosses)}</div>
      <div class="s">${f(S.focusRuns, { n: num(s.totals.runs) })}</div></div>
    <div class="tile"><div class="k">${S.totalFocus}</div><div class="v">${Math.round(s.totals.activeMinutes / 60)}h</div>
      <div class="s">${f(S.projects, { n: s.totals.projects })}</div></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2>${S.heatmap} <span>· ${S.heatmapNote}</span></h2>
      ${heatmap(s.days, s.today)}
      <h2 style="margin-top:22px">${S.last30}</h2>
      ${sparkline(s.days)}
    </div>
    <div class="panel">
      <h2>${S.topProjects} <span>· TOP 6</span></h2>
      <div class="rows">
        ${s.projects.slice(0, 6).map((x) => `
          <div class="row">
            <span class="name" title="${esc(x.project)}">${esc(x.name)}</span>
            <span class="num">${num(x.prompts)}${x.bosses ? ` · ⚔️${x.bosses}` : ''}</span>
            <span class="track"><i style="width:${(x.prompts / projMax * 100).toFixed(1)}%"></i></span>
          </div>`).join('')}
      </div>
      <h2 style="margin-top:24px">${S.hours} <span>· ${S.peak} ${peakHour}:00</span></h2>
      <div class="hours">
        ${s.hours.map((v, h) => `<div class="h${h === peakHour ? ' peak' : ''}" style="height:${(v / maxHour * 100).toFixed(1)}%" title="${h}:00 · ${num(v)}"></div>`).join('')}
      </div>
      <div class="hourlabels"><span>0</span><span>6</span><span>12</span><span>18</span><span>23</span></div>
    </div>
  </div>

  <div class="grid2 rev">
    <div class="panel">
      <h2>${S.recentBosses} <span>· ${s.totals.bosses} ${S.clearedSuffix}</span></h2>
      ${s.recentBosses.length
        ? s.recentBosses.map((b) => `
          <div class="bossrow">
            <span class="bn">⚔️ ${esc(b.name)}</span>
            <span class="bs">${Math.round(b.activeMinutes)}${S.min} · ${b.prompts} · ${fmtDate(b.endTs)}</span>
          </div>`).join('')
        : `<div class="meta">${S.noBosses}</div>`}
    </div>
    <div class="panel">
      <h2>${S.achievements} <span>· ${unlocked}/${s.achievements.length} ${S.unlockedSuffix}</span></h2>
      <div class="achs">
        ${s.achievements.map((a) => `
          <div class="ach ${a.unlockedAt ? '' : 'locked'}">
            <div class="ic">${a.unlockedAt ? a.icon : '🔒'}</div>
            <div>
              <div class="nm">${esc(a.name)}<span class="pill ${a.rarity}">${a.rarity}</span></div>
              <div class="ds">${esc(a.desc)}</div>
              ${a.unlockedAt
                ? `<div class="when">✓ ${new Date(a.unlockedAt).toLocaleDateString(LOC)} ${S.achievedOn}</div>`
                : `<div class="prog"><i style="width:${(a.have / a.need * 100).toFixed(1)}%"></i></div>
                   <div class="ds" style="margin-top:4px">${num(a.have)} / ${num(a.need)}</div>`}
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>

  <div class="shield ${lastErr ? 'err' : ''}">
    <span class="big">${lastErr ? '⚠️' : '🛡'}</span>
    <span>
      ${lastErr
        ? `<b>${lastErr}</b> ${S.shieldError}`
        : s.source.daysBeyondSource > 0
          ? `<b>${s.source.daysBeyondSource}</b> ${S.shieldBeyond}`
          : `<b>${s.totals.activeDays}</b> ${S.shieldPreserving}`}
    </span>
    <code style="margin-left:auto">${esc(s.source.dbPath)}</code>
  </div>`;
}

async function load() {
  try {
    const r = await fetch('/api/stats' + location.search);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="panel"><h2>${S.loadFailed || 'Failed to load'}</h2><div class="meta">${esc(e.message)}</div></div>`;
  }
}
load();
setInterval(load, 60_000);
</script>
</body>
</html>
